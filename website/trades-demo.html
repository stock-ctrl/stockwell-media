<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="../styles.css"/>
<link rel="stylesheet" href="site.css"/>
<style>
  body { background: var(--sw-cream-warm); padding: 40px 24px; }
  .wrap { max-width: 1120px; margin: 0 auto; }
  .demo-grid { display: grid; grid-template-columns: 0.85fr 1.15fr; gap: 52px; align-items: center; }
  @media (max-width: 900px){ .demo-grid { grid-template-columns: 1fr; gap: 28px; } }
  .demo-copy .eyebrow { margin-bottom: 14px; }
  .demo-copy h2 { font-family: var(--font-display); font-weight: 600; font-size: clamp(26px,3vw,34px); line-height:1.08; letter-spacing:-0.02em; color: var(--sw-forest); }
  .demo-copy p { font-size: 15.5px; line-height: 1.62; color: rgba(13,20,16,0.66); margin-top: 14px; max-width: 32em; }

  /* trade tabs UNDER the estimator */
  .trade-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .trade-tab { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-sans); font-weight: 500; font-size: 13px;
    color: var(--sw-forest); background: var(--sw-cream-warm); border: 1px solid rgba(13,20,16,0.14); border-radius: 999px;
    padding: 8px 13px; cursor: pointer; transition: all var(--dur-base); appearance: none; }
  .trade-tab svg { width: 15px; height: 15px; stroke: var(--sw-sage-700); }
  .trade-tab:hover { border-color: rgba(13,20,16,0.3); }
  .trade-tab.on { background: var(--sw-forest); color: var(--sw-cream); border-color: var(--sw-forest); }
  .trade-tab.on svg { stroke: var(--sw-cream); }

  .est-poly2 polygon { fill: rgba(168,201,148,0.22); stroke: var(--sw-sage-light); stroke-width: 2.5;
    vector-effect: non-scaling-stroke; stroke-linejoin: round; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.45)); }

  /* ---- landscape composite overlay + build-on animation ---- */
  .est-len i { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  #firepit, #plants, #patiofill { position:absolute; pointer-events:none; }
  #plants { inset:0; }
  #firepit { display:none; }
  #patiofill { inset:0; display:none; background-repeat:repeat; }
  .est-swatch small { opacity:.62; font-weight:500; }
  .est-replay { position:absolute; left:14px; bottom:14px; display:none; align-items:center; gap:6px;
    font-family: var(--font-mono, monospace); font-size:11px; letter-spacing:.03em; color:var(--sw-forest);
    background:rgba(244,239,228,0.92); border:1px solid rgba(13,20,16,0.12); border-radius:999px;
    padding:6px 11px; cursor:pointer; backdrop-filter:saturate(1.2); z-index:5; }
  .est-replay:hover { background:#fff; }
  @keyframes paverdrop { from{opacity:0;transform:translateY(-5px) scale(.82)} to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes drawbed  { from{stroke-dashoffset:var(--l)} to{stroke-dashoffset:0} }
  @keyframes plantpop { from{opacity:0;transform:translate(-50%,-50%) scale(0)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
  @keyframes pitignite{ from{opacity:0;transform:translate(-50%,-50%) scale(0)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
  @keyframes labelfade{ from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pitpulse { 0%,100%{box-shadow:0 1px 5px rgba(0,0,0,.55),inset 0 0 5px rgba(0,0,0,.55),0 0 5px 1px rgba(224,122,63,.30)}
                        50%{box-shadow:0 1px 5px rgba(0,0,0,.55),inset 0 0 5px rgba(0,0,0,.55),0 0 13px 3px rgba(242,146,64,.60)} }
  @keyframes ovsettle { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  @keyframes patiorise { from{opacity:0;transform:scale(.55)} to{opacity:1;transform:scale(1)} }
</style>
</head>
<body>
<div class="wrap">
  <div class="demo-grid">
    <div class="demo-copy">
      <span class="eyebrow">A perfect example · the trades</span>
      <h2 id="d-h2">A fence estimate tool.</h2>
      <p id="d-p"></p>
      <div style="margin-top:26px;">
        <div class="est-mat-lbl" id="mat-lbl">Pick a material</div>
        <div class="est-swatches" id="swatches"></div>
      </div>
    </div>

    <div>
      <div class="mock mock-estimator">
        <div class="est-map est-map--photo" id="map">
          <div class="est-shade"></div>
          <span class="est-addr"><span data-lucide="map-pin"></span>1442 Oak Ridge Dr</span>
          <span class="est-tag" id="tag">Fence estimate tool</span>
          <div id="patiofill"></div>
          <svg class="est-poly2" id="poly" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
          <div id="dots"></div>
          <div id="lens"></div>
          <div id="firepit"></div>
          <div id="plants"></div>
          <button class="est-replay" id="replay">&#8635; Replay</button>
          <div class="est-zoom"><span>+</span><span>&minus;</span></div>
        </div>
        <div class="est-pricebar">
          <span class="lab">Instant estimate</span>
          <span class="price" id="price"></span>
        </div>
        <div class="est-spec" id="spec"></div>
      </div>
      <div class="trade-tabs" id="tabs"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
const IMG = id => "url('https://images.unsplash.com/photo-"+id+"?auto=format&fit=crop&w=1200&q=80')";

/* ---------------- generic trades ---------------- */
const TRADES = [
  { key:'fencing', label:'Fencing', icon:'fence', h2:'A fence estimate tool.',
    p:'Customers drop points to trace their fence line on a map of their own yard, pick a material, and see a price by the linear foot, gates and all.',
    tag:'Fence estimate tool', type:'line',
    img:'1565402170291-8491f14678db', size:'168%', pos:'9% 40%',
    points:[[45.2,8],[74.1,11.6],[72.5,35.3],[34,77.1],[23.5,43.4],[29.9,35.1]],
    lens:[[59.7,9.8,'90 ft'],[75.3,23.5,'46 ft'],[54.3,56.2,'145 ft'],[26.8,60.3,'73 ft'],[22.7,39.3,'26 ft']],
    measure:'312 ft',
    materials:[['Cedar','$10,240','#8a5a3c'],['Chain-link','$6,080','#9aa0a6'],['Vinyl','$15,200','#e8e4da']],
    spec:['6 ft privacy','2 gates','Material + labor'] },

  { key:'landscaping', label:'Landscaping', icon:'trees', special:true,
    img:'1597026405082-eda9beae7513' },

  { key:'concrete', label:'Concrete', icon:'square', h2:'A concrete estimate tool.',
    p:'Customers draw the pour, a patio, slab, or walkway, choose a finish, and get square-foot pricing on the spot.',
    tag:'Concrete estimate tool', type:'area',
    img:'1524813686514-a57563d77965', size:'cover', pos:'center',
    points:[[40,34],[60,32],[62,56],[42,58]], measure:'520 sq ft',
    materials:[['Broom finish','$5,720','#9a9488'],['Stamped','$9,880','#8a6f57'],['Exposed agg.','$7,540','#b0a48c']],
    spec:['4 in slab','Rebar','Material + labor'] },

  { key:'driveway', label:'Driveway coating', icon:'brush', h2:'A driveway coating tool.',
    p:'Customers outline the driveway, pick a seal or re-coat, and see the price by the square foot.',
    tag:'Driveway coating tool', type:'area',
    img:'1765106893273-980e5bf89a7c', size:'cover', pos:'center',
    points:[[38,40],[56,38],[58,64],[40,66]], measure:'640 sq ft',
    materials:[['Seal coat','$1,280','#3a3a40'],['Resurface','$3,520','#6b6b72'],['Epoxy','$5,120','#8a94a8']],
    spec:['2 coats','Crack fill','Material + labor'] },

  { key:'deck', label:'Decks', icon:'layers', h2:'A deck build estimate tool.',
    p:'Customers set the deck footprint, choose the decking material, and see a build estimate by the square foot.',
    tag:'Deck estimate tool', type:'area',
    img:'1637123433690-228bb002d9e9', size:'cover', pos:'center',
    points:[[42,44],[60,42],[62,62],[44,64]], measure:'320 sq ft',
    materials:[['PT pine','$8,320','#b79a6a'],['Cedar','$11,200','#9a6a41'],['Composite','$15,680','#6f6b64']],
    spec:['Railings','Stairs','Material + labor'] },

  { key:'pressure', label:'Pressure washing', icon:'droplets', h2:'A pressure-washing tool.',
    p:'Customers outline the surface, driveway, siding, or deck, and get an on-the-spot price by the square foot.',
    tag:'Pressure washing tool', type:'area',
    img:'1556231673-79c47d27cde0', size:'cover', pos:'center',
    points:[[36,36],[58,34],[60,58],[38,60]], measure:'900 sq ft',
    materials:[['Concrete','$540','#9a9488'],['Wood deck','$720','#9a6a41'],['Siding','$680','#8a94a8']],
    spec:['Soft wash','Spot treat','Labor'] },

  { key:'roofing', label:'Roofing', icon:'home', h2:'A roofing estimate tool.',
    p:'Customers trace the roof, add pitch, and get a ballpark number by the square foot of roof area.',
    tag:'Roofing estimate tool', type:'area',
    img:'1506290690282-661fbd742be8', size:'cover', pos:'center',
    points:[[30,22],[64,22],[66,56],[32,56]], measure:'2,400 sq ft',
    materials:[['Asphalt','$18,400','#4a4a52'],['Metal','$31,200','#8a94a8'],['Tile','$40,800','#a5603f']],
    spec:['Tear-off','Underlayment','Material + labor'] },
];

/* ---------------- landscape design (composite) ---------------- */
const LS = {
  bg:{size:260,x:42.5,y:56.375},
  tag:'Landscape design tool',
  h2:'A landscape design tool.',
  p:'Customers lay out the yard piece by piece, a bed here, a patio and fire pit there, and watch the estimate build as the design comes together.',
  spec:['Design + build','Haul-away','Material + labor'],
  total:'$12,000',
  bed:[[43.9,75.9],[41.8,74.9],[41.6,72.3],[41.1,71],[40.1,69.6],[38.3,68.6],[36.5,67.6],[34.9,66.8],[33.8,66.8],[32.9,65.2],[31.8,64.2],[30.5,63.1],[29.7,62.1],[29.3,57.6],[28.7,55],[28.7,53.2],[29.3,50.3],[30.3,46.9]],
  patio:[[63.7,34],[67,20.9],[80.4,29.8],[76.6,43.7]],
  pit:{cx:70.4,cy:29.8,r:1.89},
  labels:[[26.6,63.95,'Flower bed','#804e2c','bed'],[67.9,45.7,'Paver patio','#c9b592','patio'],[56.4,28.8,'Fire pit','#f0922e','pit']],
  parts:[
    {key:'bed',   name:'Flower bed',  color:'#804e2c', price:'$2,850', note:'Mulch bed + plantings'},
    {key:'patio', name:'Paver patio', color:'#c9b592', price:'$7,200', note:'220 sq ft, paver'},
    {key:'pit',   name:'Fire pit',    color:'#f0922e', price:'$1,950', note:'Stone ring, gas'}
  ]
};

const $ = id => document.getElementById(id);
const map=$('map'), poly=$('poly'), dots=$('dots'), lens=$('lens'), fp=$('firepit'), plants=$('plants'), patiofill=$('patiofill'),
      tag=$('tag'), price=$('price'), spec=$('spec'), swatches=$('swatches'), matLbl=$('mat-lbl'),
      dh2=$('d-h2'), dp=$('d-p'), replay=$('replay'), shade=map.querySelector('.est-shade');

const lerp=(a,b,t)=>[a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
const bilerp=(P,u,v)=>lerp(lerp(P[0],P[1],u),lerp(P[3],P[2],u),v);
function smooth(pts){
  if(pts.length<3) return pts.length?('M '+pts.map(p=>p.join(' ')).join(' L ')):'';
  let d='M '+pts[0][0]+' '+pts[0][1];
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=' C '+c1x.toFixed(2)+' '+c1y.toFixed(2)+' '+c2x.toFixed(2)+' '+c2y.toFixed(2)+' '+p2[0]+' '+p2[1];
  }
  return d;
}

/* ---- generic (non-landscape) render ---- */
function genericRender(t){
  // reset landscape bits
  map.style.filter=''; if(shade){shade.style.background='';}
  fp.style.display='none'; fp.style.animation=''; plants.innerHTML=''; patiofill.style.display='none'; replay.style.display='none';
  LSFOCUS=null;
  map.style.backgroundImage = IMG(t.img);
  map.style.backgroundSize = t.size;
  map.style.backgroundPosition = t.pos;
  const pts = t.points.map(p=>p.join(',')).join(' ');
  poly.innerHTML = t.type==='line' ? '<polyline points="'+pts+'" fill="none" stroke="var(--sw-sage-light)" stroke-width="2.5" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 1px 3px rgba(0,0,0,.45))"/>' : '<polygon points="'+pts+'"/>';
  dots.innerHTML = t.points.map(p=>'<span class="est-vtx" style="left:'+p[0]+'%;top:'+p[1]+'%"></span>').join('');
  if(t.lens){
    lens.innerHTML = t.lens.map(l=>'<span class="est-len" style="left:'+l[0]+'%;top:'+l[1]+'%">'+l[2]+'</span>').join('');
  } else {
    let cx=0,cy=0; t.points.forEach(p=>{cx+=p[0];cy+=p[1];}); cx/=t.points.length; cy/=t.points.length;
    lens.innerHTML = '<span class="est-len" style="left:'+cx+'%;top:'+cy+'%">'+t.measure+'</span>';
  }
  tag.textContent=t.tag; dh2.textContent=t.h2; dp.textContent=t.p; matLbl.textContent='Pick a material';
  spec.innerHTML = t.spec.map(s=>'<span>'+s+'</span>').join('');
  swatches.innerHTML = t.materials.map((m,j)=>'<button class="est-swatch'+(j===0?' on':'')+'" data-price="'+m[1]+'" style="--sw:'+m[2]+';">'+m[0]+'</button>').join('');
  price.innerHTML = t.materials[0][1] + ' <small>· '+t.measure+'</small>';
  swatches.querySelectorAll('.est-swatch').forEach(b=>b.addEventListener('click',()=>{
    swatches.querySelectorAll('.est-swatch').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    price.innerHTML = b.dataset.price + ' <small>· '+t.measure+'</small>';
    price.classList.remove('bump'); void price.offsetWidth; price.classList.add('bump');
  }));
  lucide.createIcons({ attrs:{'stroke-width':1.75} });
}

/* ---- landscape render + build-on animation ---- */
let LSFOCUS=null, LS_FIN=null;
const lop = k => (!LSFOCUS||LSFOCUS===k)?1:0.22;

const patioCentroid = () => [LS.patio.reduce((a,p)=>a+p[0],0)/4, LS.patio.reduce((a,p)=>a+p[1],0)/4];
const patioClip = () => 'polygon('+LS.patio.map(p=>p[0]+'% '+p[1]+'%').join(', ')+')';
// crisp built edge over the real-stone fill (fill:none so the photo shows through)
function patioOutline(anim){
  const an = anim ? ';animation:labelfade .5s ease both;animation-delay:250ms' : '';
  return '<polygon points="'+LS.patio.map(p=>p.join(',')).join(' ')+'" style="fill:none;stroke:rgba(233,225,207,.9);stroke-width:1.4;stroke-linejoin:round;vector-effect:non-scaling-stroke;filter:drop-shadow(0 1px 3px rgba(0,0,0,.55));opacity:'+lop('patio')+an+'"/>';
}
// real flagstone photo, clipped to the patio shape (HTML layer = no SVG stretch)
function drawPatio(anim){
  const [cx,cy]=patioCentroid();
  const xs=LS.patio.map(p=>p[0]), ys=LS.patio.map(p=>p[1]);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const W=map.clientWidth||628, H=map.clientHeight||390;
  patiofill.style.display='block';
  patiofill.style.clipPath=patioClip(); patiofill.style.webkitClipPath=patioClip();
  patiofill.style.backgroundImage="url('../assets/textures/flagstone.jpg')";
  // map ONE copy of the stone photo onto the patio's bounding box -> no tiling, no repeat
  patiofill.style.backgroundRepeat='no-repeat';
  patiofill.style.backgroundSize=((maxX-minX)/100*W).toFixed(1)+'px '+((maxY-minY)/100*H).toFixed(1)+'px';
  patiofill.style.backgroundPosition=(minX/100*W).toFixed(1)+'px '+(minY/100*H).toFixed(1)+'px';
  patiofill.style.filter='drop-shadow(0 2px 5px rgba(0,0,0,.5)) contrast(1.06) saturate(1.05)';
  patiofill.style.opacity=lop('patio');
  patiofill.style.transformOrigin=cx+'% '+cy+'%';
  patiofill.style.animation = anim ? 'patiorise .6s cubic-bezier(.22,1,.36,1) both 150ms' : 'none';
}
function bedLen(d){ const t=document.createElementNS('http://www.w3.org/2000/svg','path'); t.setAttribute('d',d); poly.appendChild(t); const L=t.getTotalLength(); t.remove(); return L; }
function bedSVG(anim){
  const d=smooth(LS.bed), L=bedLen(d);
  const draw=off=>anim?' style="--l:'+L.toFixed(1)+';stroke-dashoffset:0;stroke-dasharray:'+L.toFixed(1)+';animation:drawbed 1.1s ease both;animation-delay:'+off+'ms"':'';
  return '<g opacity="'+lop('bed')+'">'+
    '<path d="'+d+'" fill="none" stroke="rgba(52,32,18,0.82)" stroke-width="17" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"'+draw(1050)+'/>'+
    '<path d="'+d+'" fill="none" stroke="rgba(128,78,44,0.95)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"'+draw(1120)+'/>'+
  '</g>';
}
function makePlants(){
  const b=LS.bed, out=[];
  for(let i=1;i<b.length-1;i+=2){
    const a=b[i-1], c=b[i], e=b[i+1];
    let nx=-(e[1]-a[1]), ny=(e[0]-a[0]); const m=Math.hypot(nx,ny)||1; nx/=m; ny/=m;
    const side=(i%4===1)?1:-1, off=1.5*side;
    out.push([+(c[0]+nx*off).toFixed(2), +(c[1]+ny*off).toFixed(2), 15+(i%3)*4]);
  }
  return out;
}
function drawPlants(anim){
  plants.style.opacity=lop('bed');
  plants.innerHTML=makePlants().map((p,i)=>{
    const delay=2150+i*70;
    return '<div style="position:absolute;left:'+p[0]+'%;top:'+p[1]+'%;width:'+p[2]+'px;height:'+p[2]+'px;border-radius:50%;'+
      'background:radial-gradient(circle at 38% 33%, #8fc16a, #55823f 66%, #33562a);box-shadow:0 1px 3px rgba(0,0,0,.55), inset 0 0 3px rgba(0,0,0,.25);'+
      'transform:translate(-50%,-50%) scale('+(anim?0:1)+');opacity:'+(anim?0:1)+';'+
      (anim?'animation:plantpop .42s cubic-bezier(.22,1,.36,1) both;animation-delay:'+delay+'ms;':'')+'"></div>';
  }).join('');
}
function drawPit(anim){
  const D=Math.max((2*LS.pit.r/100)*map.clientWidth,10);
  fp.style.display='block'; fp.style.left=LS.pit.cx+'%'; fp.style.top=LS.pit.cy+'%'; fp.style.width=D+'px'; fp.style.height=D+'px';
  fp.style.borderRadius='50%'; fp.style.opacity=lop('pit');
  fp.style.background='radial-gradient(circle, #ffcf8a 0%, #f0932e 14%, #c25a2a 26%, #5c2a15 38%, #2b2723 48%, #2b2723 57%, #b3a488 60%, #ded2b7 80%, #c7b997 100%)';
  if(anim){ fp.style.transform='translate(-50%,-50%) scale(0)';
    fp.style.animation='pitignite .5s cubic-bezier(.22,1,.36,1) both 2750ms, pitpulse 2.6s ease-in-out infinite 3250ms'; }
  else { fp.style.transform='translate(-50%,-50%)'; fp.style.animation='pitpulse 2.6s ease-in-out infinite'; }
}
function drawLabels(anim){
  lens.innerHTML=LS.labels.map(l=>'<span class="est-len" style="left:'+l[0]+'%;top:'+l[1]+'%;opacity:'+lop(l[4])+';'+
    (anim?'animation:labelfade .5s ease both;animation-delay:3250ms;':'')+'"><i style="background:'+l[3]+'"></i>'+l[2]+'</span>').join('');
}
function paintParts(){
  swatches.innerHTML=LS.parts.map(p=>'<button class="est-swatch'+(LSFOCUS===p.key?' on':'')+'" data-k="'+p.key+'" style="--sw:'+p.color+'">'+p.name+' <small>'+p.price+'</small></button>').join('');
  swatches.querySelectorAll('.est-swatch').forEach(bn=>bn.addEventListener('click',()=>{
    LSFOCUS = LSFOCUS===bn.dataset.k ? null : bn.dataset.k;
    const part=LS.parts.find(x=>x.key===LSFOCUS);
    price.innerHTML = part ? part.price+' <small>· '+part.note+'</small>' : LS.total+' <small>· full design</small>';
    price.classList.remove('bump'); void price.offsetWidth; price.classList.add('bump');
    renderLS(false);
  }));
}
function renderLS(anim){
  map.style.backgroundImage=IMG(LS.img_||'1597026405082-eda9beae7513');
  map.style.backgroundSize=LS.bg.size+'%'; map.style.backgroundPosition=LS.bg.x+'% '+LS.bg.y+'%';
  map.style.filter='saturate(1.12) contrast(1.04)';
  if(shade){ shade.style.background='radial-gradient(120% 100% at 50% 40%, rgba(0,0,0,0) 55%, rgba(0,0,0,.28) 100%)'; }
  poly.innerHTML = patioOutline(anim) + bedSVG(anim);
  dots.innerHTML='';
  drawPatio(anim); drawPit(anim); drawPlants(anim); drawLabels(anim);
  paintParts();
  if(anim){ replay.style.animation='ovsettle .5s cubic-bezier(.22,1,.36,1)'; }
}
function renderLandscape(){
  tag.textContent=LS.tag; dh2.textContent=LS.h2; dp.textContent=LS.p; matLbl.textContent='In this design';
  spec.innerHTML=LS.spec.map(s=>'<span>'+s+'</span>').join('');
  LSFOCUS=null;
  price.innerHTML=LS.total+' <small>· full design</small>';
  replay.style.display='inline-flex';
  renderLS(true);
  clearTimeout(LS_FIN); LS_FIN=setTimeout(()=>{ if(TRADES[CUR].special) renderLS(false); }, 4300);
  lucide.createIcons({ attrs:{'stroke-width':1.75} });
}
LS.img_='1597026405082-eda9beae7513';

/* ---------------- tabs + boot ---------------- */
let CUR=0;
const tabs=$('tabs');
tabs.innerHTML = TRADES.map((t,i)=>'<button class="trade-tab'+(i===0?' on':'')+'" data-i="'+i+'"><span data-lucide="'+t.icon+'"></span>'+t.label+'</button>').join('');
function render(i){
  CUR=i;
  const t=TRADES[i];
  if(t.special) renderLandscape();
  else genericRender(t);
}
tabs.querySelectorAll('.trade-tab').forEach(b=>b.addEventListener('click',()=>{
  tabs.querySelectorAll('.trade-tab').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); render(+b.dataset.i);
}));
replay.addEventListener('click',()=>{ if(TRADES[CUR].special) renderLandscape(); });
render(0);
lucide.createIcons({ attrs:{'stroke-width':1.75} });
</script>
</body>
</html>
